# TinyObs Base Configuration
# This file contains shared settings used across all environments.
# Environment-specific overrides go in local.toml or production.toml.

[application]
host = "0.0.0.0"
port = 4318

[storage]
data_dir = "./data"
retention_hours = 168  # 7 days

[ingest]
session_attribute = "session.id"
