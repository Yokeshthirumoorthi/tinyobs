[package]
name = "tinyobs"
version = "0.1.0"
edition = "2021"
description = "Minimal observability storage: OTLP ingest + SQLite/Parquet + DuckDB query"
license = "MIT"

[lib]
path = "src/lib.rs"

[dependencies]
# Web framework
axum = "0.8"
tower-http = { version = "0.6", features = ["cors"] }

# Async runtime
tokio = { version = "1.41", features = ["full"] }

# Databases
rusqlite = { version = "0.31", features = ["bundled"] }
rusqlite_migration = "1.2"
duckdb = { version = "1.1", features = ["bundled"] }

# OpenTelemetry
opentelemetry-proto = { version = "0.6", features = ["gen-tonic", "trace"] }
prost = "0.12"
hex = "0.4"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Time & errors
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
anyhow = "1.0"
thiserror = "2.0"

[dev-dependencies]
tokio-test = "0.4"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tempfile = "3"

[[example]]
name = "standalone"
path = "examples/standalone.rs"
